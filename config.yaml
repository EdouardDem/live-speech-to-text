# Live STT configuration
# Copy to ~/.config/live-stt/config.yaml to customise.

# Hotkey to toggle recording (pynput format).
# See https://pynput.readthedocs.io/en/latest/keyboard.html#global-hotkeys
hotkey: "<ctrl>+<shift>+z"

# HuggingFace model identifier.
# Parakeet v3 auto-detects among 25 European languages — no language flag needed.
model_name: "nvidia/parakeet-tdt-0.6b-v3"

# Audio sample rate — Parakeet expects 16 kHz mono.
sample_rate: 16000

# Compute device: auto (GPU if available, else CPU), cpu, cuda.
device: "auto"

# Paste method: auto (detect), xclip, xdotool, wayland.
paste_method: "auto"

# Hotkey for speech-to-text with translation (pynput format).
translate_hotkey: "<ctrl>+<shift>+t"

# Target language for translation (requires ANTHROPIC_API_KEY).
translate_language: "English"

# Claude model for translation.
translate_model: "claude-3-5-haiku-latest"

# Max tokens for translation response.
translate_max_tokens: 1024
